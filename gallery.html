<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>gallery — yet another gallery</title>
  <meta name="description" content="Browse the collection — images, thoughts, and moments.">

  <!-- Open Graph -->
  <meta property="og:title" content="gallery — yet another gallery">
  <meta property="og:description" content="A visual collection.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="images/demo/image-03.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- Sticky header -->
  <header class="gallery-header" id="gallery-header">
    <a href="index.html" class="gallery-header-back" aria-label="Back to home">
      <!-- Left arrow icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      yet another gallery
    </a>
    <span class="gallery-header-title" id="gallery-header-subtitle" aria-hidden="true"></span>
  </header>

  <!-- Gallery grid (populated by JS) -->
  <main class="gallery-main" id="gallery-main">
    <div class="gallery-grid" id="gallery-grid" role="list">
      <!-- Items are injected here by app.js -->
    </div>
  </main>

  <!-- ── Lightbox ────────────────────────────────────── -->
  <dialog
    class="lightbox"
    id="lightbox"
    aria-label="Image lightbox"
    aria-modal="true"
  >
    <button
      class="lightbox-close"
      id="lightbox-close"
      aria-label="Close lightbox"
      type="button"
    >✕</button>

    <div class="lightbox-inner">
      <img
        class="lightbox-img"
        id="lightbox-img"
        src=""
        alt=""
        fetchpriority="high"
      >
      <div class="lightbox-meta" id="lightbox-meta">
        <h2 class="lightbox-title" id="lightbox-title"></h2>
        <p class="lightbox-caption" id="lightbox-caption"></p>
        <time class="lightbox-date" id="lightbox-date"></time>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="lightbox-nav" aria-label="Navigate images">
      <button
        class="lightbox-nav-btn"
        id="lightbox-prev"
        type="button"
        aria-label="Previous image"
      >←</button>
      <span
        class="lightbox-counter"
        id="lightbox-counter"
        aria-live="polite"
        aria-atomic="true"
      ></span>
      <button
        class="lightbox-nav-btn"
        id="lightbox-next"
        type="button"
        aria-label="Next image"
      >→</button>
    </nav>
  </dialog>

  <script src="assets/app.js" type="module"></script>
</body>
</html>
