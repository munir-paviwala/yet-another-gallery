<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>yet another gallery</title>
  <meta name="description" content="A small, personal collection of images and moments.">

  <!-- Open Graph -->
  <meta property="og:title" content="yet another gallery">
  <meta property="og:description" content="A small, personal collection of images and moments.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Space+Grotesk:wght@300;400;500&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- ══ LANDING HERO ══════════════════════════════════════════════════════ -->
  <section class="landing" id="landing">

    <!-- Atmospheric blobs -->
    <div class="landing-blobs" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>

    <!-- Geometric pattern overlay -->
    <div class="landing-pattern" aria-hidden="true"></div>

    <!-- Film-grain overlay -->
    <div class="landing-grain" aria-hidden="true"></div>

    <!-- Hero text -->
    <div class="landing-content">
      <span class="hero-eyebrow">a personal collection</span>

      <h1 class="hero-title">
        yet another<br>gallery
      </h1>

      <p class="hero-subtitle">
        images, thoughts, and things made by someone who finds beauty
        in ordinary moments. no particular order. no particular theme.
      </p>
    </div>

    <!-- Scroll hint -->
    <div class="scroll-hint" aria-hidden="true">
      <span class="scroll-hint-label">scroll to explore</span>
      <div class="scroll-hint-line"></div>
    </div>

  </section>

  <!-- ══ GALLERY (scroll-snap slides) ═════════════════════════════════════ -->
  <div class="gallery-scroll-container" id="gallery-scroll-container" role="list">
    <!-- Slides injected by app.js -->
  </div>

  <!-- ══ LIGHTBOX ══════════════════════════════════════════════════════════ -->
  <dialog class="lightbox" id="lightbox" aria-label="Image lightbox" aria-modal="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close lightbox" type="button">✕</button>

    <div class="lightbox-inner">
      <img class="lightbox-img" id="lightbox-img" src="" alt="" fetchpriority="high">
      <div class="lightbox-meta" id="lightbox-meta">
        <h2 class="lightbox-title" id="lightbox-title"></h2>
        <p class="lightbox-caption" id="lightbox-caption"></p>
        <time class="lightbox-date" id="lightbox-date"></time>
      </div>
    </div>

    <nav class="lightbox-nav" aria-label="Navigate images">
      <button class="lightbox-nav-btn" id="lightbox-prev" type="button" aria-label="Previous image">←</button>
      <span class="lightbox-counter" id="lightbox-counter" aria-live="polite" aria-atomic="true"></span>
      <button class="lightbox-nav-btn" id="lightbox-next" type="button" aria-label="Next image">→</button>
    </nav>
  </dialog>

  <script src="assets/app.js" type="module"></script>
</body>
</html>
