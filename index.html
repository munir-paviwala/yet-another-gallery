<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>yet another gallery</title>
  <meta name="description" content="A small, personal collection of images and moments.">

  <!-- Open Graph -->
  <meta property="og:title" content="yet another gallery">
  <meta property="og:description" content="A small, personal collection of images and moments.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Space+Grotesk:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=block" rel="stylesheet">

  <link rel="stylesheet" href="assets/style.css?v=2">
</head>

<body>

  <!-- Global Atmospheric Backgrounds & Textures -->
  <div class="landing-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="landing-pattern" aria-hidden="true"></div>
  <div class="landing-grain" aria-hidden="true"></div>

  <!-- ══ GALLERY (scroll-snap slides) ═════════════════════════════════════ -->
  <div class="gallery-scroll-container" id="gallery-scroll-container" role="list">
    <!-- ══ LANDING HERO ══════════════════════════════════════════════════════ -->
    <section class="landing gallery-slide" id="landing">

      <!-- Hero text -->
      <div class="landing-content">
        <span class="hero-eyebrow">a collection</span>

        <h1 class="hero-title">
          yet another<br>gallery
        </h1>

        <p class="hero-subtitle">
          designs reflecting my mind, aesthetics and moments i find worth keeping
        </p>
      </div>

      <!-- Scroll hint -->
      <div class="scroll-hint" aria-hidden="true">
        <span class="scroll-hint-label">scroll to explore</span>
        <div class="scroll-hint-line"></div>
      </div>

    </section>

    <!-- Slides injected by app.js -->
  </div>

  <button class="audio-btn" id="audio-btn" aria-label="Toggle Ambient Audio">
    <span class="material-symbols-outlined">volume_off</span>
  </button>

  <button class="fullscreen-btn" id="fullscreen-btn" aria-label="Toggle Fullscreen">
    enter fullscreen
  </button>

  <script src="assets/app.js" type="module"></script>
</body>

</html>
