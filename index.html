<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>yet another gallery</title>
  <meta name="description" content="A small, personal collection of images and moments.">

  <!-- Open Graph / WhatsApp / Twitter -->
  <meta property="og:title" content="yet another gallery">
  <meta property="og:description" content="A small, personal collection of images and moments.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="images/demo/image-01.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;500&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <main class="landing" id="landing">

    <!-- Atmospheric colour blobs (decorative) -->
    <div class="landing-blobs" aria-hidden="true">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <!-- Film-grain overlay (decorative) -->
    <div class="landing-grain" aria-hidden="true"></div>

    <!-- Hero text -->
    <div class="landing-content">
      <span class="hero-eyebrow">a personal collection</span>

      <h1 class="hero-title">
        yet another<br>gallery
      </h1>

      <p class="hero-subtitle">
        images, thoughts, and things made by someone who finds beauty
        in ordinary moments. no particular order. no particular theme.
      </p>

      <a href="gallery.html" class="hero-enter" id="enter-gallery">
        — enter the gallery
      </a>
    </div>

    <!-- Animated scroll line (decorative) -->
    <div class="scroll-hint" aria-hidden="true">
      <div class="scroll-hint-line"></div>
    </div>

  </main>

</body>
</html>
